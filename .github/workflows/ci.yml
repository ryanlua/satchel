name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

env:
  OUTPUT_NAME: Satchel
  BUILD_PROJECT: package.project.json

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rokit toolchain
        uses: CompeyDev/setup-rokit@v0.1.2

      - name: Install Wally packages
        run: |
          wally install
          rojo sourcemap $BUILD_PROJECT --output sourcemap.json
          wally-package-types --sourcemap sourcemap.json Packages/

      - name: Run StyLua
        run: stylua --check src/ models/

      - name: Run selene
        run: selene src/ models/

      - name: Build Rojo project
        run: |
          mkdir builds
          rojo build --output builds/$OUTPUT_NAME.rbxm $BUILD_PROJECT
          rojo build --output builds/$OUTPUT_NAME.rbxmx $BUILD_PROJECT

      - name: Archive build files
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.OUTPUT_NAME }}
          path: builds/
          if-no-files-found: error
